name: CD

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  TERM: xterm

jobs:
  publish:
    name: Publishing ${{ matrix.build_target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build_target: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: '--no-default-features --features crossterm_backend,notify'
            dependencies: 'libasound2-dev libdbus-1-dev libncursesw5-dev libxcb-shape0-dev libxcb-xfixes0-dev'
          - build_target: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: '--no-default-features --features crossterm_backend,notify'
            dependencies: 'libasound2-dev libdbus-1-dev libncursesw5-dev libxcb-shape0-dev libxcb-xfixes0-dev'
          - build_target: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            features: '--no-default-features --features pancurses_backend,media_control'
          - build_target: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            features: '--no-default-features --features pancurses_backend,media_control'
    steps:
      - uses: actions/checkout@v4
        name: Checkout src
      - name: Install rustup
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
          fi
      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.dependencies }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Running cargo build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
      - name: Extract git tag
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
        id: extract_tag
      - name: Packaging assets
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ncytm-${{ steps.extract_tag.outputs.tag }}-${{ matrix.build_target }}.tar.gz ncytm
          shasum -a 256 ncytm-${{ steps.extract_tag.outputs.tag }}-${{ matrix.build_target }}.tar.gz > ncytm-${{ steps.extract_tag.outputs.tag }}-${{ matrix.build_target }}.sha256
      - name: Releasing assets
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/ncytm-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download source tarball and calculate SHA256
        id: sha256
        run: |
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: bogdan-calapod/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cd homebrew-tap
          cat > Formula/ncytm.rb << 'EOF'
          class Ncytm < Formula
            desc "YouTube Music client for the terminal"
            homepage "https://github.com/bogdan-calapod/ncytm"
            url "https://github.com/bogdan-calapod/ncytm/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
            sha256 "${{ steps.sha256.outputs.sha256 }}"
            license "BSD-2-Clause"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ncytm --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ncytm.rb
          git commit -m "ncytm: update to ${{ steps.version.outputs.version }}"
          git push
